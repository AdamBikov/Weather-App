<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Premium Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Language Selection Modal -->
    <div id="language-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Choose Language</h3>
            <p class="modal-subtitle">Select your preferred language</p>
            <div class="language-grid">
                <button class="lang-btn" data-lang="en">
                    <span class="lang-flag">🇬🇧</span>
                    <span class="lang-name">English</span>
                </button>
                <button class="lang-btn" data-lang="bg">
                    <span class="lang-flag">🇧🇬</span>
                    <span class="lang-name">Български</span>
                </button>
                <button class="lang-btn" data-lang="de">
                    <span class="lang-flag">🇩🇪</span>
                    <span class="lang-name">Deutsch</span>
                </button>
                <button class="lang-btn" data-lang="sk">
                    <span class="lang-flag">🇸🇰</span>
                    <span class="lang-name">Slovenčina</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <main class="app-container">
        <!-- Dynamic Background -->
        <div class="background-layer" id="bg-layer"></div>
        <div class="animated-bg">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>

        <!-- Header with Navigation -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">Weather</h1>
                <button id="lang-switch-btn" class="lang-switch-btn" title="Change language">
                    <i class="fas fa-globe"></i>
                </button>
            </div>
        </header>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Search Section -->
            <section class="search-section">
                <form id="search-form" class="search-form">
                    <div class="search-input-wrapper">
                        <i class="fas fa-magnifying-glass"></i>
                        <input 
                            type="text" 
                            id="city-input" 
                            class="search-input" 
                            placeholder="Search city..."
                            required
                        >
                        <button type="button" id="location-btn" class="location-btn" title="Use my location">
                            <i class="fas fa-location-crosshairs"></i>
                        </button>
                    </div>
                </form>

                <!-- Search History -->
                <div id="search-history" class="search-history"></div>
            </section>

            <!-- Loading & Error States -->
            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>
            <div id="error-message" class="error-state"></div>

            <!-- Weather Content (Hidden Initially) -->
            <div id="weather-content" class="weather-content" style="display: none;">
                
                <!-- Hero Weather Section -->
                <section class="hero-section">
                    <div class="hero-card">
                        <div class="hero-location">
                            <h2 id="city-name" class="city-name">--</h2>
                            <p id="last-updated" class="update-time">--</p>
                        </div>

                        <div class="hero-main">
                            <div class="weather-icon-container">
                                <i id="weather-icon" class="fas fa-cloud fa-4x"></i>
                            </div>
                            <div class="temperature-display">
                                <span id="temperature" class="temperature">--°</span>
                                <div class="temp-range">
                                    <span id="temp-high" class="temp-high">H: --°</span>
                                    <span id="temp-low" class="temp-low">L: --°</span>
                                </div>
                            </div>
                        </div>

                        <div class="weather-description">
                            <p id="weather-condition" class="condition-text">--</p>
                            <p id="feels-like-text" class="feels-like-hint">Feels like --°</p>
                        </div>
                    </div>
                </section>

                <!-- Hourly Forecast Timeline -->
                <section class="forecast-section">
                    <h3 class="section-title">Hourly Forecast</h3>
                    <div id="hourly-container" class="hourly-timeline"></div>
                </section>

                <!-- Insight Widgets -->
                <section class="insights-section">
                    <h3 class="section-title">Weather Details</h3>
                    <div class="insights-grid">
                        <div class="insight-card">
                            <div class="insight-icon">
                                <i class="fas fa-wind"></i>
                            </div>
                            <div class="insight-content">
                                <p class="insight-label">Wind Speed</p>
                                <p id="wind-speed" class="insight-value">-- km/h</p>
                            </div>
                        </div>

                        <div class="insight-card">
                            <div class="insight-icon">
                                <i class="fas fa-droplet"></i>
                            </div>
                            <div class="insight-content">
                                <p class="insight-label">Rain Chance</p>
                                <p id="rain-chance" class="insight-value">--%</p>
                            </div>
                        </div>

                        <div class="insight-card">
                            <div class="insight-icon">
                                <i class="fas fa-sun"></i>
                            </div>
                            <div class="insight-content">
                                <p class="insight-label">UV Index</p>
                                <p id="uv-index" class="insight-value">--</p>
                            </div>
                        </div>

                        <div class="insight-card">
                            <div class="insight-icon">
                                <i class="fas fa-thermometer"></i>
                            </div>
                            <div class="insight-content">
                                <p class="insight-label">Feels Like</p>
                                <p id="apparent-temp" class="insight-value">--°</p>
                            </div>
                        </div>

                        <div class="insight-card">
                            <div class="insight-icon">
                                <i class="fas fa-sunrise"></i>
                            </div>
                            <div class="insight-content">
                                <p class="insight-label">Sunrise</p>
                                <p id="sunrise-time" class="insight-value">--:--</p>
                            </div>
                        </div>

                        <div class="insight-card">
                            <div class="insight-icon">
                                <i class="fas fa-moon"></i>
                            </div>
                            <div class="insight-content">
                                <p class="insight-label">Sunset</p>
                                <p id="sunset-time" class="insight-value">--:--</p>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 7-Day Forecast -->
                <section class="forecast-section">
                    <h3 class="section-title">7-Day Forecast</h3>
                    <div id="forecast-container" class="forecast-list"></div>
                </section>

                <!-- Map Card -->
                <section class="map-section">
                    <div class="map-card">
                        <div id="map" class="map-container"></div>
                    </div>
                </section>

                <!-- Unit Toggle -->
                <section class="settings-section">
                    <button id="unit-toggle" class="unit-toggle-btn">
                        <i class="fas fa-temperature-high"></i>
                        <span id="unit-text">Switch to °F</span>
                    </button>
                </section>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
