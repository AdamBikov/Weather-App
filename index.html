<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - 9. клас</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
    <h1>Прогноза за времето</h1>
    
    <form id="search-form" class="search-box">
        <input type="text" id="city-input" placeholder="Въведете град на английски..." required>
        <button type="submit">Търси</button>
    </form>
    
    <div id="search-history" class="history-container"></div>
    
    <div id="loading" style="display: none;">Зареждане...</div>
    <div id="error-message" style="display: none;"></div>
    
    <div id="weather-result" class="weather-card" style="display: none;">
        <h2 id="city-name"></h2>
        
        <div class="main-info">
            <i id="weather-icon" class="fas fa-cloud fa-3x"></i>
            <span id="temperature"></span>
        </div>
        
        <div id="weather-condition"></div>
        <p id="last-updated" style="font-size: 0.8rem; color: #7a8499; margin-top: 5px;"></p>

        <div id="hourly-container" class="hourly-scroll"></div>

        <div class="metrics-grid">
            <div class="metric-widget">
                <i class="fas fa-thermometer-half"></i>
                <span>Усеща се</span>
                <strong id="apparent-temp">--°C</strong>
            </div>
            <div class="metric-widget">
                <i class="fas fa-sun"></i>
                <span>UV Индекс</span>
                <strong id="uv-index">--</strong>
            </div>
            <div class="metric-widget">
                <i class="fas fa-tint"></i>
                <span>Шанс за дъжд</span>
                <strong id="rain-chance">--%</strong>
            </div>
            <div class="metric-widget">
                <i class="fas fa-wind"></i>
                <span>Вятър</span>
                <strong id="wind-speed">--</strong> </div>
        </div>

        <div class="sun-metrics">
            <p id="sunrise-time"><i class="fas fa-sun"></i> Изгрев: --:--</p>
            <p id="sunset-time"><i class="fas fa-moon"></i> Залез: --:--</p>
        </div>

        <div id="forecast-container" class="forecast-grid"></div>
        
        <button id="unit-toggle">Към °F</button>
    </div>
</div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
