<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - 9. клас</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Прогноза за времето</h1>
        
        <form id="search-form">
            <input type="text" id="city-input" placeholder="Въведете град на английски..." required>
            <button type="submit">Търси</button>
        </form>
        <div id="search-history" class="history-container"></div>

        <div id="loading" style="display: none;">Зареждане...</div>
        <div id="error-message" style="display: none;"></div>

        <div id="weather-result" class="weather-card" style="display: none;">
            <h2 id="city-name">--</h2>
            <div class="main-info">
    <i id="weather-icon" class="fas fa-cloud fa-3x"></i>
    <span id="temperature">15°C</span>
</div>

<div id="weather-condition">Облачно</div>

<div class="extra-metrics" style="margin: 15px 0; display: flex; justify-content: center; gap: 20px;">
    <p id="apparent-temp" style="font-size: 1rem; color: #a4b3cc; margin: 0;"></p>
    <p id="uv-index" style="font-size: 1rem; color: #a4b3cc; margin: 0;"></p>
</div>

<p id="last-updated" style="font-size: 0.8rem; color: #7a8499; margin-top: 5px;"></p>
            <div class="details">
                <span>Вятър: <strong id="wind-speed">--</strong> км/ч</span>
            </div>
            <div id="forecast-container" class="forecast-grid" style="display: none;">
            </div>
        </div>
        <button id="unit-toggle" class="unit-btn">Към °F</button>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
