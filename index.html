<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="language-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); z-index: 9999; justify-content: center; align-items: center; animation: fadeIn 0.3s ease;">
    <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 24px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        <h3 id="modal-title" style="margin-bottom: 20px; font-weight: 600; color: #fff;">Choose Language / Изберете език</h3>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
            <button class="lang-btn" data-lang="bg" style="padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; color: #fff; cursor: pointer; font-weight: 500;">Български 🇧🇬</button>
            <button class="lang-btn" data-lang="en" style="padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; color: #fff; cursor: pointer; font-weight: 500;">English 🇬🇧</button>
            <button class="lang-btn" data-lang="de" style="padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; color: #fff; cursor: pointer; font-weight: 500;">Deutsch 🇩🇪</button>
            <button class="lang-btn" data-lang="sk" style="padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; color: #fff; cursor: pointer; font-weight: 500;">Slovenčina 🇸🇰</button>
        </div>
    </div>
    </div>

    <div class="container">
        <h1>Прогноза за времето</h1>
        
        <form id="search-form" class="search-box">
            <div class="input-wrapper">
                <input type="text" id="city-input" placeholder="Въведете град на английски..." required>
                <i id="location-btn" class="fas fa-crosshairs"></i>
            </div>
        <button type="submit">Търси</button>
        </form>
        
        <div id="search-history" class="history-container"></div>
        
        <div id="map-container" style="margin-bottom: 20px;">
            <div id="map"></div>
        </div>
        
        <div id="loading" style="display: none;">Зареждане...</div>
        <div id="error-message" style="display: none;"></div>
        
        <div id="weather-result" class="weather-card" style="display: none;">
            <h2 id="city-name"></h2>
            
            <div class="main-info">
                <i id="weather-icon" class="fas fa-cloud fa-3x"></i>
                <span id="temperature">--°C</span>
            </div>
            
            <div id="weather-condition"></div>
            <p id="last-updated" style="font-size: 0.8rem; color: #7a8499; margin-top: 5px;"></p>

            <div id="hourly-container" class="hourly-scroll"></div>

            <div class="metrics-grid">
                <div class="metric-widget">
                    <i class="fas fa-thermometer-half"></i>
                    <span>Усеща се</span>
                    <strong id="apparent-temp">--°C</strong>
                </div>
                <div class="metric-widget">
                    <i class="fas fa-sun"></i>
                    <span>UV Индекс</span>
                    <strong id="uv-index">--</strong>
                </div>
                <div class="metric-widget">
                    <i class="fas fa-tint"></i>
                    <span>Шанс за дъжд</span>
                    <strong id="rain-chance">--%</strong>
                </div>
                <div class="metric-widget">
                    <i class="fas fa-wind"></i>
                    <span>Вятър</span>
                    <strong id="wind-speed">-- км/ч</strong>
                </div>
            </div>

            <div class="sun-metrics">
                <p id="sunrise-time"><i class="fas fa-sun"></i> Изгрев: --:--</p>
                <p id="sunset-time"><i class="fas fa-moon"></i> Залез: --:--</p>
            </div>

            <div id="forecast-container" class="forecast-grid"></div>
            
            <button id="unit-toggle">Към °F</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
